<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkSphere Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="static/css/style.css" rel="stylesheet">
</head>
<body class="ws-body">
    <div class="ws-auth-shell">
        <div class="ws-auth-card">
            <div class="ws-brand mb-2">WorkSphere</div>
            <p class="text-muted-custom mb-4">Sign in to manage the full lifecycle of your organization's assets.</p>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input class="form-control" id="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button class="btn btn-primary w-100">Login</button>
            </form>
            <div id="login-error" class="text-danger mt-3"></div>
        </div>
    </div>
    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script>
        if (Auth.isLoggedIn()) {
            window.location.href = "dashboard.html";
        }
        document.getElementById("login-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            try {
                const result = await API.post("/auth/login", {
                    username: document.getElementById("username").value,
                    password: document.getElementById("password").value
                });
                Auth.setSession(result);
                window.location.href = "dashboard.html";
            } catch (error) {
                document.getElementById("login-error").textContent = error.message;
            }
        });
    </script>
</body>
</html>
